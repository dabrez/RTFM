<!DOCTYPE html>
<html>
<head>
    <title>RTFM Bot Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h1>RTFM Bot Dashboard</h1>
    {% if user %}
        <p>Welcome, {{ user.username }}!</p>
        <a href="/guilds"><button>Manage Servers</button></a>
        <a href="/logout"><button>Logout</button></a>
    {% else %}
        <p>Login to see your server's bot history.</p>
        <a href="/login"><button>Login with Discord</button></a>
    {% endif %}
</body>
</html>
