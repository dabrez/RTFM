# ============================================================================
# RTFM Discord Bot - Simplified Docker Compose
# ============================================================================

networks:
  rtfm-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  chroma_data:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rtfm-app
    command: /app/entrypoint.sh
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      SESSION_SECRET: ${SESSION_SECRET}
      POSTGRES_HOST: db
      POSTGRES_DB: rtfm_db
      POSTGRES_USER: rtfm_user
      POSTGRES_PASSWORD: rtfm_password
      REDIS_HOST: redis
    volumes:
      - ./discord_db:/app/discord_db
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - db
      - redis
    networks:
      - rtfm-network

  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_DB: rtfm_db
      POSTGRES_USER: rtfm_user
      POSTGRES_PASSWORD: rtfm_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - rtfm-network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always
    networks:
      - rtfm-network
